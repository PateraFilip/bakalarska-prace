<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla JS - Todo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js" defer></script>
    <style>
        body { background-color: #000; color: white; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 font-sans selection:bg-green-500/30">

    <div class="bg-gray-900/50 p-8 rounded-[40px] border border-gray-800 backdrop-blur-xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">

        <h1 class="text-4xl font-black text-center text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500 mb-8 uppercase tracking-tighter italic">
            Vanilla JS Todo
        </h1>

        <form id="todo-form" class="flex gap-4 mb-8">
            <input type="text" id="todo-input" placeholder="Co je třeba udělat?" autocomplete="off"
                   class="flex-1 bg-black/40 border border-gray-700 rounded-2xl p-4 text-white placeholder-gray-500 outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition shadow-inner">
            <button type="submit"
                    class="bg-green-600 hover:bg-green-500 text-white px-8 py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-green-900/20 transition transform active:scale-95">
                Přidat
            </button>
        </form>

        <div class="flex bg-gray-900 rounded-2xl p-1 border border-gray-800 mb-6 shrink-0">
            <button onclick="setFilter('all')" id="filter-all" class="filter-btn flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-gray-800 text-white shadow-lg">Vše</button>
            <button onclick="setFilter('active')" id="filter-active" class="filter-btn flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-gray-500 hover:text-gray-300">Aktivní</button>
            <button onclick="setFilter('completed')" id="filter-completed" class="filter-btn flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-gray-500 hover:text-gray-300">Hotové</button>
        </div>

        <div id="todo-list" class="flex flex-col gap-3 overflow-y-auto pr-2 pb-2">
            </div>

        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-12 opacity-50">
            <p class="font-bold text-sm uppercase tracking-widest text-gray-500">Žádné úkoly v seznamu</p>
        </div>

        <div class="mt-6 pt-6 border-t border-gray-800 flex justify-between items-center text-[10px] font-bold uppercase tracking-widest text-gray-500">
            <span id="items-left">0 úkolů zbývá</span>
            <button onclick="clearCompleted()" id="clear-btn" class="hover:text-red-500 transition hidden">Smazat hotové</button>
        </div>

    </div>
</body>
</html>
