<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla JS - Watchlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #3b82f6; cursor: pointer; margin-top: -6px; }
        input[type=range].slider-yellow::-webkit-slider-thumb { background: #eab308; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #374151; border-radius: 2px; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-black text-white font-sans selection:bg-blue-500/30 min-h-screen">

    <div id="auth-container" class="hidden min-h-screen flex items-center justify-center p-4">
        <div class="bg-gray-900 p-8 rounded-3xl w-full max-w-md border border-gray-800 shadow-2xl">
            <h2 id="auth-title" class="text-3xl font-black text-white mb-8 text-center italic tracking-tighter uppercase">WatchList</h2>
            <form id="auth-form" class="flex flex-col gap-4">
                <input type="text" id="username" placeholder="Uživatel" required class="p-4 bg-gray-800 rounded-2xl text-white outline-none focus:ring-2 focus:ring-blue-600 transition">
                <input type="password" id="password" placeholder="Heslo" required class="p-4 bg-gray-800 rounded-2xl text-white outline-none focus:ring-2 focus:ring-blue-600 transition">
                <button type="submit" id="auth-submit-btn" class="bg-blue-600 py-4 rounded-2xl font-black text-white hover:bg-blue-700 transition uppercase tracking-widest">Vstoupit</button>
            </form>
            <button id="toggle-auth-mode" class="w-full mt-4 text-gray-500 text-xs font-bold uppercase hover:text-white transition tracking-widest">Vytvořit účet</button>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <nav class="bg-black/80 backdrop-blur-xl border-b border-gray-900 p-4 sticky top-0 z-30">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <h1 class="text-2xl font-black text-blue-500 italic tracking-tighter uppercase">WatchList</h1>

                <div class="flex bg-gray-900 rounded-2xl p-1 border border-gray-800" id="nav-tabs">
                    <button data-tab="to_watch" class="nav-btn px-8 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-gray-500 hover:text-gray-300">K zhlédnutí</button>
                    <button data-tab="watched" class="nav-btn px-8 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-gray-500 hover:text-gray-300">Zhlédnuté</button>
                    <button data-tab="search" class="nav-btn px-8 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-gray-500 hover:text-gray-300">Hledat</button>
                </div>

                <div class="flex items-center gap-3 bg-gray-900 px-4 py-2 rounded-full border border-gray-800">
                    <span id="current-user-display" class="text-xs font-black text-blue-500 uppercase tracking-widest">User</span>
                    <button id="logout-btn" class="group flex items-center justify-center w-8 h-8 rounded-full bg-gray-800 hover:bg-red-900/50 hover:border-red-500 transition-all border border-gray-700">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 text-gray-400 group-hover:text-red-500 transition-colors"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" /></svg>
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6">
            <form id="global-search-form" class="hidden flex gap-3 mb-8 max-w-3xl mx-auto animate-in fade-in">
                <input type="text" id="global-search-input" class="flex-1 p-5 bg-gray-900 border border-gray-800 rounded-3xl outline-none focus:ring-2 focus:ring-blue-600 shadow-2xl" placeholder="Hledat v TMDB...">
                <button type="submit" class="bg-blue-600 px-10 rounded-3xl font-black uppercase text-xs tracking-widest">Najít</button>
            </form>

            <div class="flex flex-col lg:flex-row gap-8 mb-12 items-center justify-between bg-gray-900/40 p-8 rounded-[40px] border border-gray-800 shadow-inner">

                <div class="flex flex-1 w-full gap-4">
                    <input type="text" id="local-search-input" placeholder="Filtr v seznamu..." class="flex-1 bg-black border border-gray-800 p-4 rounded-2xl text-xs outline-none focus:border-blue-600 transition">
                    <div id="search-results-info" class="hidden flex items-center px-4">
                        <span class="text-gray-500 text-xs font-bold uppercase tracking-widest">Výsledky: 0</span>
                    </div>
                </div>

                <div class="flex flex-wrap gap-10 items-center w-full lg:w-auto">

                    <div class="flex gap-4 border-r border-gray-800 pr-6">
                        <div class="flex flex-col min-w-[80px]">
                            <div class="flex justify-between items-center mb-2">
                            <span class="text-[9px] text-gray-500 uppercase font-black">TMDB Min: </span>
                            <span id="tmdb-min-val" class="text-xs font-bold text-yellow-500">0</span>
                            </div>
                            <input class="w-full h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer slider-yellow" type="range" id="tmdb-min" min="0" max="10" step="0.5" value="0">
                        </div>
                        <div class="flex flex-col min-w-[80px]">
                            <div class="flex justify-between items-center mb-2">
                            <span class="text-[9px] text-gray-500 uppercase font-black">TMDB Max: </span>
                            <span id="tmdb-max-val" class="text-xs font-bold text-yellow-500">10</span>
                            </div>
                            <input class="w-full h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer slider-yellow" type="range" id="tmdb-max" min="0" max="10" step="0.5" value="10">
                        </div>
                    </div>

                    <div id="my-rating-container" class="flex gap-4 border-r border-gray-800 pr-6">
                        <div class="flex flex-col min-w-[80px]">
                            <div class="flex justify-between items-center mb-2">
                            <span class="text-[9px] text-gray-500 uppercase font-black">Moje Min: </span>
                            <span id="my-min-val" class="text-xs font-bold text-blue-400">0</span>
                            </div>
                            <input type="range" id="my-min" min="0" max="10" step="1" value="0">
                        </div>
                        <div class="flex flex-col min-w-[80px]">
                            <div class="flex justify-between items-center mb-2">
                            <span class="text-[9px] text-gray-500 uppercase font-black">Moje Max: </span>
                            <span id="my-max-val" class="text-xs font-bold text-blue-400">10</span>
                            </div>
                            <input type="range" id="my-max" min="0" max="10" step="1" value="10">
                        </div>
                    </div>

                    <div class="flex flex-col">
                        <span class="text-[9px] font-black text-gray-500 uppercase mb-2">Řadit</span>
                        <select id="sort-select" class="bg-black border border-gray-800 p-3 rounded-xl text-xs font-bold outline-none cursor-pointer focus:border-blue-600">
                            <option value="default">Výchozí</option>
                            <option value="date_desc">Nejnovější</option>
                            <option value="date_asc">Nejstarší</option>
                            <option value="rate_tmdb_desc">TMDB: Nejlepší</option>
                            <option value="rate_tmdb_asc">TMDB: Nejhůřší</option>
                            <option value="rate_my_desc">Moje: Nejlepší</option>
                            <option value="rate_my_asc">Moje: Nejhůřší</option>
                            <option value="az">A-Z</option>
                            <option value="za">Z-A</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="movies-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-10 fade-in"></div>

            <div id="empty-state" class="hidden col-span-full flex flex-col items-center justify-center py-20 opacity-50">
                <p class="font-bold text-sm uppercase tracking-widest">Žádné filmy neodpovídají filtrům</p>
            </div>
        </main>
    </div>

    <div id="movie-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-50 backdrop-blur-md overflow-y-auto">
        <div class="bg-gray-900 rounded-[40px] max-w-5xl w-full flex flex-col md:flex-row overflow-hidden border border-gray-800 shadow-2xl animate-in zoom-in duration-300">
            <div id="modal-content" class="flex flex-col md:flex-row w-full"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
