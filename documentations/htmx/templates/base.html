<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTMX - Rozcestník</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        body { background-color: #000; color: white; scroll-behavior: smooth; }
        .glass { background: rgba(17, 24, 39, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(55, 65, 81, 0.5); }
    </style>
</head>
<body class="font-sans antialiased selection:bg-blue-500/30 flex flex-col min-h-screen" hx-boost="true">

    <nav class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-xl border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="hidden md:flex gap-8 text-sm font-bold uppercase tracking-widest text-gray-400">
                <a href="/" class="hover:text-white transition-colors {% if request.url.path == '/' %}text-white border-b-2 border-blue-500{% endif %}">Domů</a>
                <a href="/info-todo" class="hover:text-white transition-colors {% if request.url.path == '/info-todo' %}text-white border-b-2 border-blue-500{% endif %}">Todo</a>
                <a href="/info-watchlist" class="hover:text-white transition-colors {% if request.url.path == '/info-watchlist' %}text-white border-b-2 border-blue-500{% endif %}">WatchList</a>
                <a href="/info-game" class="hover:text-white transition-colors {% if request.url.path == '/info-game' %}text-white border-b-2 border-blue-500{% endif %}">Game of Life</a>
            </div>
        </div>
    </nav>

    <div class="flex-1 pt-20">
        {% block content %}{% endblock %}
    </div>

    <footer class="border-t border-gray-900 bg-black py-12 text-center mt-auto">
        <p class="text-gray-600 text-xs font-bold uppercase tracking-widest">
            2026 Bakalářská práce - Filip Patera
        </p>
    </footer>

</body>
</html>
